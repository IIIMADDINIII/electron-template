  tslib: ^2.8.1
  "@iiimaddiniii/remote-objects": ^0.1.0-1
  "@lit/localize": ^0.12.2
  lit: ^3.3.3
  lit-html: ^3.3.3
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vitest: 4.1.9
  vite-plus: 0.2.1
  
overrides:
